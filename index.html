        <div style="text-align:center;padding:30px 0 20px;border-top:1px solid #2A2415;margin-top:20px;">

            <div style="color:#6A6053;font-size:14px;font-style:italic;margin-top:4px;">

    <script>
        // ════════════════════════════════════════════════
        // ДАННЫЕ: 26 ВОПРОСОВ (ВСЕ ФОРМУЛЫ ИСПРАВЛЕНЫ)
        // ════════════════════════════════════════════════
        const questions = [{
            id: 1,
            title: "Комплексные числа. Формы записи. Модуль и аргумент. Степени и корни. Стереографическая проекция",
            source: "Алгебраическая, геометрическая, тригонометрическая, показательная форма. Модуль и аргумент. Степени и корни. Стереографическое проектирование.",
            content: `
                <div class="defbox">
                    <span class="label label-def">Комплексное число.</span> Пара $(x,y)\\in\\R^2$ с формой записи $z=x+iy$ (где $i^2=-1$). Здесь $x=\\Re z$ — вещественная часть, $y=\\Im z$ — мнимая часть. Сопряжённое: $\\bar z=x-iy$.
                </div>
                <p><b>Арифметические операции</b> ($z_k=x_k+iy_k$):</p>
                <div class="formula">$z_1 \\pm z_2 = (x_1 \\pm x_2) + i(y_1 \\pm y_2)$</div>
                <div class="formula">$z_1 z_2 = (x_1x_2 - y_1y_2) + i(x_1y_2 + x_2y_1)$</div>
                <div class="formula">$\\dfrac{z_1}{z_2} = \\dfrac{z_1\\bar z_2}{|z_2|^2} = \\dfrac{(x_1x_2 + y_1y_2) + i(x_2y_1 - x_1y_2)}{x_2^2 + y_2^2}$ $(z_2 \\ne 0)$</div>

                <div class="defbox">
                    <span class="label label-def">Модуль.</span> $|z| = \\sqrt{x^2 + y^2} = \\sqrt{z\\bar z}$.<br>
                    Свойства: $|z_1z_2| = |z_1||z_2|$; $|z_1 + z_2| \\le |z_1| + |z_2|$; $|z_1| - |z_2| \\le |z_1 - z_2|$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Аргумент.</span> Угол $\\varphi$ между положительной осью $Ox$ и вектором $z \\ne 0$; определён с точностью до $2\\pi k$.<br>
                    <i>Главное значение</i> $\\arg z \\in (-\\pi,\\pi]$. Многозначный аргумент $\\Arg z = \\arg z + 2\\pi k$, $k \\in \\Z$.
                </div>

                <div class="defbox">
                    <span class="label label-def">Тригонометрическая форма.</span> $z = r(\\cos\\varphi + i\\sin\\varphi)$, где $r = |z|$, $\\varphi = \\arg z$.<br>
                    Умножение: $z_1z_2 = r_1r_2(\\cos(\\varphi_1+\\varphi_2) + i\\sin(\\varphi_1+\\varphi_2))$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Формула Эйлера и показательная форма.</span> $e^{i\\varphi} = \\cos\\varphi + i\\sin\\varphi$, поэтому $z = re^{i\\varphi}$.
                </div>

                <div class="thmbox">
                    <span class="label label-thm">Формула Муавра.</span> $z^n = r^n(\\cos n\\varphi + i\\sin n\\varphi)$.<br>
                    То есть $|z^n| = |z|^n$, $\\arg(z^n) = n\\arg z$.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Корни $n$-й степени.</span> Уравнение $w^n = z$ при $z \\ne 0$ имеет ровно $n$ решений:
                    <div class="formula">$w_k = \\sqrt[n]{r}\\left(\\cos\\dfrac{\\varphi + 2\\pi k}{n} + i\\sin\\dfrac{\\varphi + 2\\pi k}{n}\\right)$, $k = 0,1,\\dots,n-1$</div>
                    Геометрически — вершины правильного $n$-угольника на окружности $|w| = \\sqrt[n]{r}$.
                </div>
                <div class="exbox">
                    <span class="label label-ex">Пример.</span> $\\sqrt[3]{-8}$: $r=8$, $\\varphi=\\pi$. Корни:
                    $w_k = 2\\left(\\cos\\dfrac{\\pi + 2\\pi k}{3} + i\\sin\\dfrac{\\pi + 2\\pi k}{3}\\right)$, $k=0,1,2$.
                    Явно: $w_0 = 1 + i\\sqrt3$, $w_1 = -2$, $w_2 = 1 - i\\sqrt3$.
                </div>

                <div class="defbox">
                    <span class="label label-def">Расширенная плоскость.</span> $\\overline\\C = \\C \\cup \\{\\infty\\}$. Окрестность $\\infty$ — внешность круга $\\{|z| > R\\}$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Стереографическая проекция.</span> Биекция между $\\overline\\C$ и единичной сферой $S^2 \\subset \\R^3$ (сфера Римана):
                    <div class="formula">$\\xi = \\dfrac{2x}{1 + |z|^2},\\qquad \\eta = \\dfrac{2y}{1 + |z|^2},\\qquad \\zeta = \\dfrac{|z|^2 - 1}{|z|^2 + 1}$</div>
                    <p><b>Проверка:</b> $\\xi^2 + \\eta^2 + \\zeta^2 = 1$</p>
                    <p><b>Обратная проекция:</b> $z = \\dfrac{\\xi + i\\eta}{1 - \\zeta}$ при $\\zeta \\ne 1$</p>
                    <p><b>Предел:</b> при $|z| \\to \\infty$: $\\xi \\to 0$, $\\eta \\to 0$, $\\zeta \\to 1$ → северный полюс $N(0,0,1)$.</p>
                </div>
                <div class="rembox">
                    <span class="label label-rem">Свойство.</span> Стереографическая проекция является гомеоморфизмом $\\overline\\C \\to S^2$ и переводит окружности и прямые плоскости в окружности сферы.
                </div>
            `
        }, {
            id: 2,
            title: "Последовательности комплексных чисел. Сходимость. Теоремы",
            source: "Определение сходящейся последовательности. Критерий через части. Теоремы о сходящихся последовательностях.",
            content: `
                <div class="defbox">
                    <span class="label label-def">Сходимость.</span> Последовательность $\\{z_n\\}$ <i>сходится</i> к $z_0 \\in \\C$, если
                    $\\forall\\varepsilon > 0\\; \\exists N:\\; |z_n - z_0| < \\varepsilon$ при всех $n > N$. Пишут $z_n \\to z_0$ или $\\lim_{n\\to\\infty} z_n = z_0$.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Критерий через части.</span> $z_n = x_n + iy_n \\to z_0 = x_0 + iy_0$ тогда и только тогда, когда $x_n \\to x_0$ и $y_n \\to y_0$ (как вещественные последовательности).
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Основные теоремы.</span>
                    <ul>
                        <li><b>Единственность предела.</b> Если $z_n \\to a$ и $z_n \\to b$, то $a = b$.</li>
                        <li><b>Ограниченность.</b> Сходящаяся последовательность ограничена: $\\exists M:\\; |z_n| \\le M$.</li>
                        <li><b>Арифметика пределов.</b> Если $z_n \\to a$, $w_n \\to b$, то
                            $z_n \\pm w_n \\to a \\pm b$, $z_n w_n \\to ab$, $z_n / w_n \\to a/b$ ($b \\ne 0$).</li>
                        <li><b>Критерий Коши.</b> $\\{z_n\\}$ сходится $\\Longleftrightarrow$ $\\forall\\varepsilon > 0\\; \\exists N:\\; |z_m - z_n| < \\varepsilon$ при $m,n > N$.</li>
                        <li><b>Теорема Больцано–Вейерштрасса.</b> Из любой ограниченной последовательности можно выделить сходящуюся подпоследовательность.</li>
                    </ul>
                </div>
                <div class="corbox">
                    <span class="label label-cor">Следствие.</span> $|z_n| \\to |z_0|$; $\\Re z_n \\to \\Re z_0$; $\\Im z_n \\to \\Im z_0$; $\\bar z_n \\to \\bar z_0$.
                </div>
                <div class="exbox">
                    <span class="label label-ex">Пример сходящейся.</span> $z_n = \\dfrac{1}{n} + i\\left(1 - \\dfrac{1}{n^2}\\right) \\to 0 + i\\cdot 1 = i$.
                </div>
                <div class="exbox">
                    <span class="label label-ex">Пример расходящейся.</span> $z_n = i^n$: $1, i, -1, -i, 1, \\dots$ — не сходится.
                </div>
            `
        }, {
            id: 3,
            title: "Множества на комплексной плоскости. Кривые, контуры. Области",
            source: "Топологические понятия. Кривые и контуры. Односвязность и многосвязность. Примеры.",
            content: `
                <div class="defbox">
                    <span class="label label-def">Окрестность.</span> Открытый круг $B(z_0,\\varepsilon) = \\{z: |z - z_0| < \\varepsilon\\}$.<br>
                    <i>Проколотая</i> окрестность: $\\mathring B(z_0,\\varepsilon) = B \\setminus \\{z_0\\}$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Типы точек.</span> Точка $z_0$ называется:
                    <ul>
                        <li><b>внутренней</b> для $E$, если $\\exists\\varepsilon > 0:\\; B(z_0,\\varepsilon) \\subset E$;</li>
                        <li><b>граничной</b> для $E$, если любая $B(z_0,\\varepsilon)$ содержит точки из $E$ и из $\\C \\setminus E$;</li>
                        <li><b>предельной</b> для $E$, если $\\forall\\varepsilon > 0:\\; \\mathring B(z_0,\\varepsilon) \\cap E \\ne \\varnothing$.</li>
                    </ul>
                    Граница: $\\partial E$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Открытое/замкнутое множество.</span> $E$ <i>открыто</i>, если $E = \\operatorname{int} E$. $E$ <i>замкнуто</i>, если $\\C \\setminus E$ открыто. <i>Замыкание</i>: $\\overline E = E \\cup \\partial E$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Связность и область.</span> Множество $E$ <i>связно</i>, если его нельзя разбить на два непустых открытых непересекающихся подмножества. <i>Область</i> $G$ — открытое связное непустое подмножество $\\C$. <i>Замкнутая область</i>: $\\overline G = G \\cup \\partial G$.
                </div>

                <div class="defbox">
                    <span class="label label-def">Кривая.</span> Непрерывное отображение $\\gamma:[a,b] \\to \\C$, $t \\mapsto z(t)$.<br>
                    Кривая <i>замкнута</i>, если $z(a) = z(b)$; <i>проста</i> (Жордана), если не имеет самопересечений.
                </div>
                <div class="defbox">
                    <span class="label label-def">Гладкая кривая.</span> $z(t) = x(t) + iy(t)$ — гладкая, если $x'(t), y'(t)$ непрерывны и $z'(t) \\ne 0$.<br>
                    <i>Контур</i> — кусочно-гладкая простая замкнутая кривая. Положительная ориентация (CCW) — область слева.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Теорема Жордана.</span> Простая замкнутая кривая делит $\\C$ на две области: <i>внутреннюю</i> (ограниченную) и <i>внешнюю</i> (неограниченную).

                <div class="defbox">

                    <i>Примеры:</i> кольцо $r < |z| < R$ (двусвязная); $\\C \\setminus \\{0\\}$; плоскость с несколькими вырезанными кругами.

            id: 4,
            title: "Функции комплексного переменного. Предел. Непрерывность",
            source: "Определение функции. Предел в точке. Непрерывность. Примеры.",
            content: `
                <div class="defbox">
                    <span class="label label-def">Функция.</span> Отображение $f:D \\subset \\C \\to \\C$. Записывается как $f(z) = u(x,y) + iv(x,y)$, где $u,v: \\R^2 \\to \\R$ — вещественная и мнимая части ($z = x + iy$).
                </div>
                <div class="exbox">
                    <span class="label label-ex">Примеры.</span>
                    <ul>
                        <li>$f(z) = z^2$: $u = x^2 - y^2$, $v = 2xy$.</li>
                        <li>$f(z) = e^z = e^x(\\cos y + i\\sin y)$.</li>
                        <li>$f(z) = \\bar z$: $u = x$, $v = -y$ (непрерывна, но нигде не аналитична).</li>
                        <li>$f(z) = 1/z$ ($z \\ne 0$): $u = x/(x^2+y^2)$, $v = -y/(x^2+y^2)$.</li>
                        <li>$f(z) = \\ln|z| + i\\arg z$ (ветвь логарифма).</li>
                    </ul>
                </div>
                <div class="defbox">
                    <span class="label label-def">Предел.</span> $\\displaystyle\\lim_{z \\to z_0} f(z) = w_0$, если $\\forall\\varepsilon > 0\\; \\exists\\delta > 0:\\; 0 < |z - z_0| < \\delta \\Rightarrow |f(z) - w_0| < \\varepsilon$.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Критерий через части.</span> $\\displaystyle\\lim_{z \\to z_0} f(z) = u_0 + iv_0$ тогда и только тогда, когда
                    $\\lim_{(x,y) \\to (x_0,y_0)} u(x,y) = u_0$ и $\\lim_{(x,y) \\to (x_0,y_0)} v(x,y) = v_0$.
                </div>
                <div class="rembox">
                    <span class="label label-rem">Важно.</span> Предел по комплексной переменной означает, что $z \\to z_0$ с <i>любого</i> направления — это строже, чем предел по вещественному параметру.
                </div>
                <div class="defbox">
                    <span class="label label-def">Непрерывность.</span> $f$ <i>непрерывна</i> в $z_0$, если $\\displaystyle\\lim_{z \\to z_0} f(z) = f(z_0)$.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Теоремы о непрерывных функциях.</span>
                    <ul>
                        <li>Сумма, разность, произведение, частное непрерывных функций — непрерывны (частное — в точках, где знаменатель $\\ne 0$).</li>
                        <li>Суперпозиция непрерывных функций непрерывна.</li>
                        <li>Если $f$ непрерывна на компакте $K$, то $|f|$ ограничена и достигает своих максимума и минимума.</li>
                    </ul>
                </div>
                <div class="exbox">
                    <span class="label label-ex">Пример.</span> $f(z) = \\Re z$. $f(x+iy) = x$. $\\lim_{z \\to 0} f(z) = 0$, $f$ непрерывна в $0$.
                </div>
            `

            id: 5,
            title: "Дифференцируемость. Условия Коши–Римана. Аналитическая функция",
            source: "Производная. УКР. Достаточные условия. Аналитическая функция. Примеры.",
            content: `
                <div class="defbox">
                    <span class="label label-def">Производная.</span> $f'(z_0) = \\displaystyle\\lim_{\\Delta z \\to 0} \\dfrac{f(z_0 + \\Delta z) - f(z_0)}{\\Delta z}$, если предел существует (и не зависит от направления $\\Delta z \\to 0$).
                </div>
                <div class="rembox">
                    <span class="label label-rem">Ключевое отличие.</span> Предел $\\Delta z \\to 0$ берётся по всем направлениям комплексной плоскости — поэтому дифференцируемость по $z$ значительно сильнее, чем дифференцируемость по $(x,y) \\in \\R^2$.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Теорема (необходимые условия).</span> Если $f = u + iv$ дифференцируема в точке $z_0 = x_0 + iy_0$, то в этой точке существуют все четыре частные производные $u_x, u_y, v_x, v_y$ и выполнены <b>условия Коши–Римана (УКР)</b>:
                    <div class="formula">$\\dfrac{\\partial u}{\\partial x} = \\dfrac{\\partial v}{\\partial y},\\qquad \\dfrac{\\partial u}{\\partial y} = -\\dfrac{\\partial v}{\\partial x}$</div>
                    Производная тогда: $f'(z_0) = u_x + iv_x = v_y - iu_y = u_x - iu_y = v_y + iv_x$.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Теорема (достаточные условия).</span> Если в окрестности $z_0$ существуют непрерывные частные производные $u_x, u_y, v_x, v_y$ и выполнены УКР, то $f$ дифференцируема в $z_0$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Аналитическая (голоморфная) функция.</span> $f$ <i>аналитична</i> в области $G$, если она дифференцируема в каждой точке $G$. Если $f$ аналитична в $\\C$ — называется <i>целой</i> функцией.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Необходимое и достаточное условие.</span> $f = u + iv$ аналитична в области $G$ тогда и только тогда, когда $u,v$ имеют непрерывные частные производные первого порядка в $G$ и выполнены УКР в каждой точке $G$.
                </div>
                <div class="exbox">
                    <span class="label label-ex">Примеры.</span>
                    <ul>
                        <li><b>Аналитические на $\\C$:</b> $z^n$; $e^z$; $\\sin z$; $\\cos z$; многочлены $P(z)$.</li>
                        <li><b>Аналитична на $\\C \\setminus \\{0\\}$:</b> $1/z$.</li>
                        <li><b>Не аналитична нигде:</b> $\\bar z$, $|z|$, $\\Re z$ — УКР нарушены во всех точках.</li>
                        <li><b>Дифференцируема лишь в одной точке:</b> $|z|^2$ — УКР выполнены только при $z = 0$.</li>
                    </ul>
                </div>
                <div class="rembox">
                    <span class="label label-rem">Гармоничность.</span> Если $f = u + iv$ аналитична, то $u$ и $v$ — гармонические функции: $\\Delta u = u_{xx} + u_{yy} = 0$, $\\Delta v = 0$. Функции $u$ и $v$ называются <i>сопряжёнными гармоническими</i>.
                </div>
            `

            id: 6,
            title: "Свойства аналитических функций. Конформное отображение",
            source: "Основные свойства. Модуль и аргумент производной. Конформное отображение.",
            content: `
                <div class="thmbox">
                    <span class="label label-thm">Алгебраические свойства.</span> Сумма, разность, произведение, частное (знаменатель $\\ne 0$) и суперпозиция аналитических функций — аналитические функции.
                </div>
                <div class="defbox">
                    <span class="label label-def">Модуль производной.</span> $|f'(z_0)|$ — <i>коэффициент линейного растяжения</i> в точке $z_0$: бесконечно малые отрезки в окрестности $z_0$ умножаются на $|f'(z_0)|$.
                    <div class="formula">$|f'(z_0)| = \\sqrt{u_x^2 + v_x^2} = \\sqrt{J_f(z_0)}$</div>
                    где $J_f = u_x v_y - u_y v_x = u_x^2 + v_x^2$ — якобиан отображения.
                </div>
                <div class="defbox">
                    <span class="label label-def">Аргумент производной.</span> $\\arg f'(z_0) = \\alpha$ — <i>угол поворота</i>: касательная к любой кривой, проходящей через $z_0$, поворачивается на угол $\\alpha$ при отображении $f$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Конформность в точке.</span> Отображение $f$ <i>конформно</i> в точке $z_0$, если оно:
                    <ul>
                        <li>сохраняет углы между кривыми (по величине и ориентации);</li>
                        <li>является локально изотропным растяжением.</li>
                    </ul>
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Теорема.</span> Аналитическая функция $f$ является конформным отображением в каждой точке $z_0$, где $f'(z_0) \\ne 0$. В точках, где $f'(z_0) = 0$, конформность нарушается (углы умножаются на кратность нуля производной).
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Теорема Римана об отображении.</span> Любая односвязная область $G \\subsetneq \\C$ конформно отображается на единичный круг $|w| < 1$. Если дополнительно зафиксировать $f(z_0) = 0$ и $\\arg f'(z_0) = \\alpha$, то отображение единственно.
                </div>
                <div class="exbox">
                    <span class="label label-ex">Пример.</span> $f(z) = z^2$ конформна всюду, кроме $z = 0$. В $z = 0$ углы удваиваются.
                </div>
            `

            id: 7,
            title: "Интеграл по комплексной переменной",
            source: "Определение. Свойства. Вычисление. Оценка интеграла.",
            content: `
                <div class="defbox">
                    <span class="label label-def">Интеграл по кривой.</span> Пусть $\\gamma: z(t)$, $t \\in [a,b]$ — кусочно-гладкая кривая, $f$ непрерывна на $\\gamma$. Тогда:
                    <div class="formula">$\\int_\\gamma f(z)\\,dz = \\int_a^b f(z(t))\\,z'(t)\\,dt$</div>
                </div>
                <p><b>Связь с вещественными интегралами:</b> при $f = u + iv$, $dz = dx + idy$:</p>
                <div class="formula">$\\int_\\gamma f\\,dz = \\int_\\gamma (u\\,dx - v\\,dy) + i\\int_\\gamma (v\\,dx + u\\,dy)$</div>

                <div class="thmbox">
                    <span class="label label-thm">Свойства интеграла.</span>
                    <ul>
                        <li><b>Линейность:</b> $\\int_\\gamma(\\alpha f + \\beta g)\\,dz = \\alpha\\int_\\gamma f\\,dz + \\beta\\int_\\gamma g\\,dz$.</li>
                        <li><b>Аддитивность по контуру:</b> $\\int_{\\gamma_1 + \\gamma_2} = \\int_{\\gamma_1} + \\int_{\\gamma_2}$.</li>
                        <li><b>Смена направления:</b> $\\int_{-\\gamma} f\\,dz = -\\int_\\gamma f\\,dz$.</li>
                        <li><b>Оценка модуля:</b> $\\displaystyle\\left|\\int_\\gamma f\\,dz\\right| \\le \\max_\\gamma |f| \\cdot L(\\gamma)$, где $L$ — длина $\\gamma$.</li>
                    </ul>
                </div>
                <div class="defbox">
                    <span class="label label-def">Первообразная.</span> $F$ — первообразная $f$ в $G$, если $F'(z) = f(z)$ в $G$.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Формула Ньютона–Лейбница.</span> Если $F' = f$ в односвязной $G$, то
                    <div class="formula">$\\int_{z_1}^{z_2} f(z)\\,dz = F(z_2) - F(z_1)$</div>
                    (не зависит от пути в $G$).
                </div>
                <div class="exbox">
                    <span class="label label-ex">Пример.</span> $\\displaystyle\\oint_{|z|=1} \\frac{dz}{z}$: $z(t) = e^{it}$, $z'(t) = ie^{it}$, $t \\in [0,2\\pi]$.
                    $\\int_0^{2\\pi} \\frac{1}{e^{it}} \\cdot ie^{it}\\,dt = i\\int_0^{2\\pi} dt = 2\\pi i$.
                </div>
            `

            title: "Теорема Коши",
            source: "Для односвязной и многосвязной области. Независимость от пути.",
            content: `
                <div class="thmbox">
                    <span class="label label-thm">Теорема Коши (для односвязной области).</span> Если $f$ аналитична в односвязной области $G$, то для любого замкнутого контура $\\gamma \\subset G$:
                    <div class="formula">$\\oint_\\gamma f(z)\\,dz = 0$</div>
                </div>
                <div class="exbox">
                    <span class="label label-ex">Идея доказательства.</span> Используется формула Грина:
                    $\\oint_\\gamma (u\\,dx - v\\,dy) = \\iint_D (-v_x - u_y)\\,dx\\,dy = 0$ и
                    $\\oint_\\gamma (v\\,dx + u\\,dy) = \\iint_D (u_x - v_y)\\,dx\\,dy = 0$ в силу УКР.
                </div>
                <div class="corbox">
                    <span class="label label-cor">Следствие — независимость от пути.</span> В односвязной области $\\displaystyle\\int_{z_1}^{z_2} f\\,dz$ не зависит от пути.
                </div>
                <div class="corbox">
                    <span class="label label-cor">Следствие — существование первообразной.</span> В односвязной области каждая аналитическая функция имеет первообразную: $F(z) = \\int_{z_0}^z f(\\zeta)\\,d\\zeta$.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Теорема Коши для многосвязной области.</span> Пусть $f$ аналитична в области $G$, ограниченной внешним контуром $\\Gamma$ (положительная ориентация) и внутренними контурами $\\gamma_1,\\dots,\\gamma_n$ (отрицательная ориентация). Тогда:
                    <div class="formula">$\\oint_\\Gamma f\\,dz = \\sum_{k=1}^n \\oint_{\\gamma_k} f\\,dz$</div>
                    где все контуры ориентированы положительно (область слева).
                </div>
                <div class="exbox">
                    <span class="label label-ex">Важный пример.</span> $\\displaystyle\\oint_{|z|=r} \\frac{dz}{(z-a)^n} = \\begin{cases} 2\\pi i, & n = 1, \\\\ 0, & n \\ne 1 \\end{cases}$ при $|a| < r$.
                </div>
            `

            id: 9,
            title: "Интегральная формула Коши",
            source: "Формулировка, доказательство, следствия. Формула для производных.",
            content: `
                <div class="thmbox">
                    <span class="label label-thm">Интегральная формула Коши.</span> Пусть $f$ аналитична в замкнутой области $\\overline G$ с кусочно-гладкой границей $\\Gamma$ (ориентирована положительно). Тогда для любой точки $z_0 \\in G$:
                    <div class="formula">$f(z_0) = \\dfrac{1}{2\\pi i}\\oint_\\Gamma \\dfrac{f(\\zeta)}{\\zeta - z_0}\\,d\\zeta$</div>
                </div>
                <div class="exbox">
                    <span class="label label-ex">Доказательство.</span> Интеграл заменяем на интеграл по малой окружности $\\gamma_\\varepsilon$:
                    <div class="formula">$\\oint_\\Gamma \\dfrac{f(\\zeta)}{\\zeta - z_0}\\,d\\zeta =
                    \\oint_{\\gamma_\\varepsilon} \\dfrac{f(\\zeta) - f(z_0)}{\\zeta - z_0}\\,d\\zeta + f(z_0)\\oint_{\\gamma_\\varepsilon} \\dfrac{d\\zeta}{\\zeta - z_0}$</div>
                    Первый интеграл $\\to 0$ при $\\varepsilon \\to 0$ (по непрерывности $f$), второй $= 2\\pi i$.

                <div class="corbox">
                    <span class="label label-cor">Формула для производных.</span> Для любого $n \\ge 0$:
                    <div class="formula">$f^{(n)}(z_0) = \\dfrac{n!}{2\\pi i}\\oint_\\Gamma \\dfrac{f(\\zeta)}{(\\zeta - z_0)^{n+1}}\\,d\\zeta$</div>
                </div>
                <div class="exbox">
                    <span class="label label-ex">Пример.</span> $\\displaystyle\\oint_{|z|=2} \\dfrac{e^z}{z^3}\\,dz = \\dfrac{2\\pi i}{2!} \\cdot (e^z)''|_{z=0} = \\dfrac{2\\pi i}{2} \\cdot e^0 = \\pi i$.
                </div>
                <div class="rembox">
                    <span class="label label-rem">Смысл.</span> Значение аналитической функции внутри контура полностью определяется её значениями на контуре.
                </div>
            `

            title: "Принцип максимума модуля",

            content: `
                <div class="thmbox">
                    <span class="label label-thm">Принцип максимума модуля.</span> Пусть $f$ аналитична в ограниченной области $G$ и непрерывна на $\\overline G$. Тогда:
                    <div class="formula">$\\max_{\\overline G} |f(z)| = \\max_{\\partial G} |f(z)|$</div>

                <div class="corbox">

                    <div class="formula">$\\min_{\\overline G} |f(z)| = \\min_{\\partial G} |f(z)|$</div>
                </div>

            content: `
                <div class="thmbox">
                    <span class="label label-thm">Теорема.</span> Если $f$ аналитична в области $G$, то $f$ бесконечно дифференцируема в $G$, и все производные $f^{(n)}$ тоже аналитичны в $G$.

                <div class="defbox">

                <div class="thmbox">

            source: "Формулировка, доказательство, применение. Основная теорема алгебры.",
            content: `
                <div class="thmbox">
                    <span class="label label-thm">Теорема Руше.</span> Если $f$ и $g$ аналитичны в $\\overline G$ и на $\\partial G$ выполнено <b>строгое</b> неравенство $|g(z)| < |f(z)|$, то функции $f$ и $f + g$ имеют одинаковое число нулей в $G$ (с учётом кратности).
                </div>
                <div class="exbox">
                    <span class="label label-ex">Доказательство.</span> Применяем принцип аргумента к $f$ и $f + g$. Так как $|g| < |f|$ на $\\partial G$, функция $f + tg$ не обращается в нуль на $\\partial G$ при $t \\in [0,1]$. Число нулей $N(t) = \\dfrac{1}{2\\pi i}\\oint \\dfrac{(f + tg)'}{f + tg}\\,dz$ непрерывно зависит от $t$ и целочисленно, следовательно $N(0) = N(1)$.
                </div>
                <div class="exbox">
                    <span class="label label-ex">Пример.</span> Доказать, что $P(z) = z^8 + 3z^3 + 2$ имеет все корни в $|z| < 2$.<br>
                    На $|z| = 2$: $|f| = |z|^8 = 256$; $|g| = |3z^3 + 2| \\le 3 \\cdot 8 + 2 = 26 < 256$. По теореме Руше $P$ имеет столько же нулей в $|z| < 2$, сколько $z^8$ — то есть 8.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Основная теорема алгебры.</span> Любой многочлен $P(z) = z^n + a_{n-1}z^{n-1} + \\cdots + a_0$ степени $n \\ge 1$ имеет ровно $n$ комплексных корней (с учётом кратности).
                </div>
                <div class="exbox">
                    <span class="label label-ex">Доказательство через теорему Руше.</span> Возьмём $f(z) = z^n$, $g(z) = a_{n-1}z^{n-1} + \\cdots + a_0$. На $|z| = R$ при достаточно большом $R$: $|g(z)| \\le |a_{n-1}|R^{n-1} + \\cdots + |a_0| < R^n = |f(z)|$. По теореме Руше $P = f + g$ имеет $n$ нулей в $|z| < R$.

                        <li><b>Круги в круги:</b> дробно-линейное отображение переводит окружности и прямые (= окружности через $\\infty$) в окружности и прямые.</li>

            }
        });

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Smooth scroll for TOC links
        document.querySelectorAll('.toc a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const target = document.querySelector(link.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });

        // Keyboard shortcut: Home = scroll to top
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Home') {
                e.preventDefault();
                scrollToTop();
            }
        });

        console.log('✅ ТФКП шпаргалка загружена! Все 26 вопросов. Все формулы исправлены.');
    </script>
</body>
</html>
