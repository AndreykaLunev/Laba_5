<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>ТФКП — Шпаргалка к экзамену (все 26 вопросов)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #14110E;
            color: #F2ECE1;
            font-family: 'Segoe UI', 'Liberation Serif', Georgia, serif;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ─── Header ─── */
        .header {
            text-align: center;
            padding: 40px 20px 30px;
            border-bottom: 1px solid #C97B4A;
            margin-bottom: 30px;
        }

        .header .sub {
            color: #B8AE9B;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 700;
            color: #E0A458;
            letter-spacing: 2px;
        }

        .header .desc {
            color: #B8AE9B;
            font-size: 18px;
            font-style: italic;
            margin-top: 6px;
        }

        .header .meta {
            color: #6A6053;
            font-size: 14px;
            margin-top: 10px;
        }

        .header .divider {
            width: 200px;
            height: 2px;
            background: #C97B4A;
            margin: 16px auto 0;
        }

        /* ─── TOC ─── */
        .toc {
            background: #1B1713;
            border: 1px solid #2A2415;
            border-radius: 8px;
            padding: 20px 30px;
            margin-bottom: 30px;
        }

        .toc h2 {
            color: #E0A458;
            font-size: 20px;
            margin-bottom: 12px;
            border-bottom: 1px solid #2A2415;
            padding-bottom: 8px;
        }

        .toc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 4px 20px;
        }

        .toc a {
            color: #D9A441;
            text-decoration: none;
            font-size: 14px;
            padding: 3px 0;
            display: block;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }

        .toc a:hover {
            color: #F2ECE1;
            border-bottom-color: #E0A458;
            padding-left: 6px;
        }

        .toc a .num {
            color: #C97B4A;
            font-weight: 700;
            margin-right: 6px;
        }

        /* ─── Questions ─── */
        .question {
            background: #1B1713;
            border: 1px solid #2A2415;
            border-radius: 8px;
            padding: 24px 28px;
            margin-bottom: 24px;
            transition: all 0.2s;
        }

        .question:hover {
            border-color: #C97B4A;
        }

        .q-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            border-bottom: 1px solid #2A2415;
            padding-bottom: 10px;
        }

        .q-num {
            font-size: 18px;
            font-weight: 700;
            color: #E0A458;
            background: #2A2415;
            padding: 2px 14px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .q-title {
            font-size: 17px;
            font-weight: 600;
            color: #F2ECE1;
            flex: 1;
        }

        .q-source {
            font-size: 12px;
            color: #6A6053;
            font-style: italic;
            width: 100%;
            margin-top: -4px;
        }

        /* ─── Content Blocks ─── */
        .q-body {
            font-size: 15px;
            color: #E8E0D4;
        }

        .q-body p {
            margin-bottom: 8px;
        }

        .q-body .defbox,
        .q-body .thmbox,
        .q-body .corbox,
        .q-body .exbox,
        .q-body .rembox {
            padding: 12px 16px;
            margin: 10px 0;
            border-radius: 6px;
            border-left: 4px solid;
        }

        .q-body .defbox {
            background: #211C2C;
            border-left-color: #9C8AD1;
        }

        .q-body .thmbox {
            background: #2A1A1A;
            border-left-color: #E0746B;
        }

        .q-body .corbox {
            background: #2A2415;
            border-left-color: #D9A441;
            border-style: dashed;
            border-width: 1px 1px 1px 4px;
        }

        .q-body .exbox {
            background: #14241D;
            border-left-color: #6FC79A;
        }

        .q-body .rembox {
            background: #161E22;
            border-left-color: #86A9B8;
            color: #B8AE9B;
            font-style: italic;
        }

        .q-body .label {
            font-weight: 700;
        }

        .q-body .label-def {
            color: #9C8AD1;
        }
        .q-body .label-thm {
            color: #E0746B;
        }
        .q-body .label-cor {
            color: #D9A441;
        }
        .q-body .label-ex {
            color: #6FC79A;
        }
        .q-body .label-rem {
            color: #86A9B8;
        }

        .q-body .formula {
            text-align: center;
            padding: 10px 14px;
            margin: 8px 0;
            background: #0D0B09;
            border-radius: 4px;
            font-size: 16px;
            color: #F2ECE1;
            font-family: 'Cambria', 'Times New Roman', serif;
            border: 1px solid #2A2415;
            overflow-x: auto;
        }

        .q-body .formula-inline {
            color: #E0A458;
            font-family: 'Cambria', 'Times New Roman', serif;
        }

        .q-body ul,
        .q-body ol {
            padding-left: 24px;
            margin: 6px 0 10px;
        }

        .q-body li {
            margin-bottom: 3px;
        }

        .q-body .example-list {
            list-style: none;
            padding-left: 0;
        }

        .q-body .example-list li {
            padding: 4px 0 4px 20px;
            position: relative;
        }

        .q-body .example-list li::before {
            content: "▸";
            color: #6FC79A;
            position: absolute;
            left: 0;
        }

        .q-body .highlight {
            color: #E0A458;
        }

        .q-body .dim {
            color: #6A6053;
        }

        /* ─── Scroll Top ─── */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #E0A458;
            color: #14110E;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(224, 164, 88, 0.3);
            transition: all 0.3s;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .scroll-top:hover {
            background: #C97B4A;
            transform: scale(1.08);
        }

        .scroll-top.visible {
            display: flex;
        }

        /* ─── Progress ─── */
        .progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: #E0A458;
            transition: width 0.2s;
            z-index: 200;
            box-shadow: 0 0 12px rgba(224, 164, 88, 0.4);

        /* ─── Responsive ─── */
        @media (max-width: 768px) {

            }
            .header .desc {
                font-size: 15px;

            .toc {
                padding: 14px 16px;
            }
            .toc-grid {
                grid-template-columns: 1fr;
            }
            .question {
                padding: 16px;

            .q-title {

            }
            .q-body {
                font-size: 14px;
            }
            .q-body .formula {
                font-size: 14px;
                padding: 8px 10px;
            }
            .scroll-top {

                right: 16px;

        @media (max-width: 480px) {

        /* ─── Print ─── */
        @media print {

            .container {

            }
            .header h1 {

            .header .sub,
            .header .meta,

                color: #555;

            .toc {

                break-inside: avoid;

            .toc h2 {

                border-bottom-color: #ddd;
            }

            .question {
                background: white;
                border-color: #ddd;
                break-inside: avoid;

            }
            .q-body {

            .q-body .corbox,

            .q-body .formula {

                border-color: #ddd !important;
                color: #222 !important;
            }
            .q-num {
                background: #eee !important;
                color: #1a1a2e !important;
            }
            .q-source {
                color: #666 !important;
            }
            .q-body .dim {
                color: #666 !important;
            }
            .q-body .highlight {
                color: #0f3460 !important;
            }
            .scroll-top {
                display: none !important;
            }
            .progress {
                display: none !important;
            }
        }
    </style>

        <!-- ══════════════════════════════════════════ -->

        <!-- Footer -->
        <div style="text-align:center;padding:30px 0 20px;border-top:1px solid #2A2415;margin-top:20px;">
            <div style="color:#E0A458;font-size:20px;font-weight:700;">Удачи на экзамене! 🍀</div>
            <div style="color:#6A6053;font-size:14px;font-style:italic;margin-top:4px;">

    <!-- Scroll Top -->
    <button class="scroll-top" id="scrollTopBtn" onclick="scrollToTop()">↑</button>

    <script>
        // ════════════════════════════════════════════════
        // ДАННЫЕ: 26 ВОПРОСОВ (полная версия)
        // ════════════════════════════════════════════════
        const questions = [{
            id: 1,
            title: "Комплексные числа. Формы записи. Модуль и аргумент. Степени и корни. Стереографическая проекция",
            source: "Алгебраическая, геометрическая, тригонометрическая, показательная форма. Модуль и аргумент. Степени и корни. Стереографическое проектирование.",
            content: `
                <div class="defbox">
                    <span class="label label-def">Определение.</span> Комплексное число — пара $(x,y)\\in\\R^2$ с формой записи $z=x+iy$ (где $i^2=-1$). Здесь $x=\\Re z$ — вещественная часть, $y=\\Im z$ — мнимая часть. Сопряжённое: $\\bar z=x-iy$.
                </div>
                <p><b>Арифметические операции</b> ($z_k=x_k+iy_k$):</p>
                <div class="formula">$z_1\\pm z_2=(x_1\\pm x_2)+i(y_1\\pm y_2)$</div>
                <div class="formula">$z_1 z_2=(x_1x_2-y_1y_2)+i(x_1y_2+x_2y_1)$</div>
                <div class="formula">$\\dfrac{z_1}{z_2}=\\dfrac{z_1\\bar z_2}{|z_2|^2}$ $(z_2\\ne0)$</div>

                <div class="defbox">
                    <span class="label label-def">Модуль.</span> $|z|=\\sqrt{x^2+y^2}=\\sqrt{z\\bar z}$.<br>
                    Свойства: $|z_1z_2|=|z_1||z_2|$; $|z_1+z_2|\\le|z_1|+|z_2|$; $|z_1|-|z_2|\\le|z_1-z_2|$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Аргумент.</span> Угол $\\varphi$ между положительной осью $Ox$ и вектором $z\\ne0$; определён с точностью до $2\\pi k$.<br>
                    <i>Главное значение</i> $\\arg z\\in(-\\pi,\\pi]$. Многозначный аргумент $\\Arg z=\\arg z+2\\pi k$, $k\\in\\Z$.
                </div>

                <div class="defbox">
                    <span class="label label-def">Тригонометрическая форма.</span> $z=r(\\cos\\varphi+i\\sin\\varphi)$, где $r=|z|$, $\\varphi=\\arg z$.<br>
                    Умножение: $z_1z_2=r_1r_2(\\cos(\\varphi_1+\\varphi_2)+i\\sin(\\varphi_1+\\varphi_2))$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Формула Эйлера и показательная форма.</span> $e^{i\\varphi}=\\cos\\varphi+i\\sin\\varphi$, поэтому $z=re^{i\\varphi}$.
                </div>

                <div class="thmbox">
                    <span class="label label-thm">Формула Муавра.</span> $z^n=r^n(\\cos n\\varphi+i\\sin n\\varphi)$.<br>
                    То есть $|z^n|=|z|^n$, $\\arg(z^n)=n\\arg z$.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Корни $n$-й степени.</span> Уравнение $w^n=z$ при $z\\ne0$ имеет ровно $n$ решений:
                    <div class="formula">$w_k=\\sqrt[n]{r}\\left(\\cos\\dfrac{\\varphi+2\\pi k}{n}+i\\sin\\dfrac{\\varphi+2\\pi k}{n}\\right)$, $k=0,1,\\dots,n-1$</div>
                    Геометрически — вершины правильного $n$-угольника.
                </div>
                <div class="exbox">
                    <span class="label label-ex">Пример.</span> $\\sqrt[3]{-8}$: $r=8$, $\\varphi=\\pi$. Корни:
                    $w_k=2\\left(\\cos\\dfrac{\\pi+2\\pi k}{3}+i\\sin\\dfrac{\\pi+2\\pi k}{3}\\right)$, $k=0,1,2$.
                    Явно: $w_0=1+i\\sqrt3$, $w_1=-2$, $w_2=1-i\\sqrt3$.
                </div>

                <div class="defbox">
                    <span class="label label-def">Расширенная плоскость.</span> $\\overline\\C=\\C\\cup\\{\\infty\\}$. Окрестность $\\infty$ — внешность круга $\\{|z|>R\\}$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Стереографическая проекция.</span> Биекция между $\\overline\\C$ и сферой Римана $S^2$:
                    <div class="formula">$\\xi=\\dfrac{x}{1+|z|^2},\\quad \\eta=\\dfrac{y}{1+|z|^2},\\quad \\zeta=\\dfrac{|z|^2}{1+|z|^2}$</div>
                    При $|z|\\to\\infty$ точка стремится к северному полюсу $N\\leftrightarrow\\infty$.
                </div>
                <div class="rembox">
                    <span class="label label-rem">Свойство.</span> Стереографическая проекция — гомеоморфизм $\\overline\\C\\to S^2$, переводит окружности и прямые в окружности сферы.
                </div>
            `
        }, {
            id: 2,
            title: "Последовательности комплексных чисел. Сходимость. Теоремы",
            source: "Определение сходящейся последовательности. Критерий через части. Теоремы о сходящихся последовательностях.",
            content: `
                <div class="defbox">
                    <span class="label label-def">Сходимость.</span> Последовательность $\\{z_n\\}$ <i>сходится</i> к $z_0\\in\\C$, если
                    $\\forall\\varepsilon>0\\;\\exists N:\\;|z_n-z_0|<\\varepsilon$ при всех $n>N$. Пишут $z_n\\to z_0$.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Критерий через части.</span> $z_n=x_n+iy_n\\to z_0=x_0+iy_0$ тогда и только тогда, когда $x_n\\to x_0$ и $y_n\\to y_0$ (как вещественные последовательности).
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Основные теоремы.</span>
                    <ul>
                        <li><b>Единственность предела.</b> Если $z_n\\to a$ и $z_n\\to b$, то $a=b$.</li>
                        <li><b>Ограниченность.</b> Сходящаяся последовательность ограничена.</li>
                        <li><b>Арифметика пределов.</b> Если $z_n\\to a$, $w_n\\to b$, то
                            $z_n\\pm w_n\\to a\\pm b$, $z_nw_n\\to ab$, $z_n/w_n\\to a/b$ ($b\\ne0$).</li>
                        <li><b>Критерий Коши.</b> $\\{z_n\\}$ сходится $\\Longleftrightarrow$
                            $\\forall\\varepsilon>0\\;\\exists N:\\;|z_m-z_n|<\\varepsilon$ при $m,n>N$.</li>
                        <li><b>Теорема Больцано–Вейерштрасса.</b> Из любой ограниченной последовательности можно выделить сходящуюся подпоследовательность.</li>
                    </ul>
                </div>
                <div class="corbox">
                    <span class="label label-cor">Следствие.</span> $|z_n|\\to|z_0|$; $\\Re z_n\\to\\Re z_0$; $\\Im z_n\\to\\Im z_0$; $\\bar z_n\\to\\bar z_0$.
                </div>
                <div class="exbox">
                    <span class="label label-ex">Пример сходящейся.</span> $z_n=\\dfrac{1}{n}+i\\left(1-\\dfrac{1}{n^2}\\right)\\to 0+i\\cdot1=i$.
                </div>
                <div class="exbox">
                    <span class="label label-ex">Пример расходящейся.</span> $z_n=i^n$: $1,i,-1,-i,1,\\dots$ — не сходится.
                </div>
            `
        }, {
            id: 3,
            title: "Множества на комплексной плоскости. Кривые, контуры. Области",
            source: "Топологические понятия. Кривые и контуры. Односвязность и многосвязность. Примеры.",
            content: `
                <div class="defbox">
                    <span class="label label-def">Окрестность.</span> Открытый круг $B(z_0,\\varepsilon)=\\{z:|z-z_0|<\\varepsilon\\}$.<br>
                    <i>Проколотая</i> окрестность: $\\mathring B(z_0,\\varepsilon)=B\\setminus\\{z_0\\}$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Типы точек.</span> Точка $z_0$ называется:
                    <ul>
                        <li><b>внутренней</b> для $E$, если $\\exists\\varepsilon>0:\\;B(z_0,\\varepsilon)\\subset E$;</li>
                        <li><b>граничной</b> для $E$, если любая $B(z_0,\\varepsilon)$ содержит точки из $E$ и из $\\C\\setminus E$;</li>
                        <li><b>предельной</b> для $E$, если $\\forall\\varepsilon>0:\\;\\mathring B(z_0,\\varepsilon)\\cap E\\ne\\varnothing$.</li>
                    </ul>
                    Граница: $\\partial E$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Открытое/замкнутое множество.</span> $E$ <i>открыто</i>, если $E=\\operatorname{int}E$. $E$ <i>замкнуто</i>, если $\\C\\setminus E$ открыто. <i>Замыкание</i>: $\\overline E=E\\cup\\partial E$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Связность и область.</span> Множество $E$ <i>связно</i>, если его нельзя разбить на два непустых открытых непересекающихся подмножества. <i>Область</i> $G$ — открытое связное непустое подмножество $\\C$. <i>Замкнутая область</i>: $\\overline G=G\\cup\\partial G$.
                </div>

                <div class="defbox">
                    <span class="label label-def">Кривая.</span> Непрерывное отображение $\\gamma:[a,b]\\to\\C$, $t\\mapsto z(t)$.<br>
                    Кривая <i>замкнута</i>, если $z(a)=z(b)$; <i>проста</i> (Жордана), если не имеет самопересечений.
                </div>
                <div class="defbox">
                    <span class="label label-def">Гладкая кривая.</span> $z(t)=x(t)+iy(t)$ — гладкая, если $x'(t),y'(t)$ непрерывны и $z'(t)\\ne0$.<br>

            content: `
                <div class="defbox">
                    <span class="label label-def">Функция.</span> Отображение $f:D\\subset\\C\\to\\C$. Записывается как $f(z)=u(x,y)+iv(x,y)$, где $u,v:\\R^2\\to\\R$ — вещественная и мнимая части ($z=x+iy$).
                </div>
                <div class="exbox">
                    <span class="label label-ex">Примеры.</span>

                        <li>$f(z)=z^2$: $u=x^2-y^2$, $v=2xy$.</li>

                        <li>$f(z)=\\bar z$: $u=x$, $v=-y$ (непрерывна, но нигде не аналитична).</li>
                        <li>$f(z)=1/z$ ($z\\ne0$): $u=x/(x^2+y^2)$, $v=-y/(x^2+y^2)$.</li>
                        <li>$f(z)=\\ln|z|+i\\arg z$ (ветвь логарифма).</li>

                </div>
                <div class="defbox">
                    <span class="label label-def">Предел.</span> $\\displaystyle\\lim_{z\\to z_0}f(z)=w_0$, если $\\forall\\varepsilon>0\\;\\exists\\delta>0:\\;0<|z-z_0|<\\delta\\Rightarrow|f(z)-w_0|<\\varepsilon$.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Критерий через части.</span> $\\displaystyle\\lim_{z\\to z_0}f(z)=u_0+iv_0$ тогда и только тогда, когда
                    $\\lim_{(x,y)\\to(x_0,y_0)}u(x,y)=u_0$ и $\\lim_{(x,y)\\to(x_0,y_0)}v(x,y)=v_0$.
                </div>
                <div class="rembox">
                    <span class="label label-rem">Важно.</span> Предел по комплексной переменной означает, что $z\\to z_0$ с <i>любого</i> направления — это строже, чем предел по вещественному параметру.
                </div>
                <div class="defbox">
                    <span class="label label-def">Непрерывность.</span> $f$ <i>непрерывна</i> в $z_0$, если $\\displaystyle\\lim_{z\\to z_0}f(z)=f(z_0)$.

                    <span class="label label-thm">Теоремы о непрерывных функциях.</span>

                        <li>Если $f$ непрерывна на компакте $K$, то $|f|$ ограничена и достигает максимума и минимума.</li>

            `

            id: 5,
            title: "Дифференцируемость. Условия Коши–Римана. Аналитическая функция",

            content: `
                <div class="defbox">
                    <span class="label label-def">Производная.</span> $f'(z_0)=\\displaystyle\\lim_{\\Delta z\\to0}\\dfrac{f(z_0+\\Delta z)-f(z_0)}{\\Delta z}$, если предел существует (и не зависит от направления $\\Delta z\\to0$).

                    <span class="label label-rem">Ключевое отличие.</span> Предел $\\Delta z\\to0$ берётся по всем направлениям — поэтому дифференцируемость по $z$ значительно сильнее, чем по $(x,y)\\in\\R^2$.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Теорема (необходимые условия).</span> Если $f=u+iv$ дифференцируема в $z_0=x_0+iy_0$, то в этой точке выполнены <b>условия Коши–Римана (УКР)</b>:
                    <div class="formula">$\\dfrac{\\partial u}{\\partial x}=\\dfrac{\\partial v}{\\partial y},\\qquad \\dfrac{\\partial u}{\\partial y}=-\\dfrac{\\partial v}{\\partial x}$</div>
                    Производная: $f'(z_0)=u_x+iv_x=v_y-iu_y$.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Теорема (достаточные условия).</span> Если в окрестности $z_0$ существуют непрерывные частные производные $u_x,u_y,v_x,v_y$ и выполнены УКР, то $f$ дифференцируема в $z_0$.
                </div>
                <div class="defbox">
                    <span class="label label-def">Аналитическая функция.</span> $f$ <i>аналитична</i> в области $G$, если она дифференцируема в каждой точке $G$. Если $f$ аналитична в $\\C$ — называется <i>целой</i> функцией.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Необходимое и достаточное условие.</span> $f=u+iv$ аналитична в $G$ $\\Longleftrightarrow$ $u,v$ имеют непрерывные частные производные и выполнены УКР в каждой точке $G$.
                </div>
                <div class="exbox">
                    <span class="label label-ex">Примеры.</span>

                        <li><b>Не аналитична нигде:</b> $\\bar z$, $|z|$, $\\Re z$.</li>
                        <li><b>Дифференцируема лишь в одной точке:</b> $|z|^2$ — УКР только при $z=0$.</li>

                </div>
                <div class="rembox">
                    <span class="label label-rem">Гармоничность.</span> Если $f=u+iv$ аналитична, то $u$ и $v$ — гармонические функции: $\\Delta u=0$, $\\Delta v=0$.
                </div>
            `

            content: `
                <div class="defbox">
                    <span class="label label-def">Интеграл по кривой.</span> Пусть $\\gamma: z(t)$, $t\\in[a,b]$ — кусочно-гладкая кривая, $f$ непрерывна на $\\gamma$. Тогда:
                    <div class="formula">$\\int_\\gamma f(z)\\,dz=\\int_a^b f(z(t))\\,z'(t)\\,dt$</div>
                </div>
                <p><b>Связь с вещественными интегралами:</b> при $f=u+iv$, $dz=dx+idy$:</p>
                <div class="formula">$\\int_\\gamma f\\,dz=\\int_\\gamma(u\\,dx-v\\,dy)+i\\int_\\gamma(v\\,dx+u\\,dy)$</div>

                <div class="thmbox">
                    <span class="label label-thm">Свойства интеграла.</span>
                    <ul>
                        <li><b>Линейность:</b> $\\int_\\gamma(\\alpha f+\\beta g)\\,dz=\\alpha\\int_\\gamma f\\,dz+\\beta\\int_\\gamma g\\,dz$.</li>
                        <li><b>Аддитивность:</b> $\\int_{\\gamma_1+\\gamma_2}=\\int_{\\gamma_1}+\\int_{\\gamma_2}$.</li>
                        <li><b>Смена направления:</b> $\\int_{-\\gamma}f\\,dz=-\\int_\\gamma f\\,dz$.</li>
                        <li><b>Оценка модуля:</b> $\\left|\\int_\\gamma f\\,dz\\right|\\le\\max_\\gamma|f|\\cdot L(\\gamma)$.</li>
                    </ul>
                </div>
                <div class="defbox">
                    <span class="label label-def">Первообразная.</span> $F$ — первообразная $f$ в $G$, если $F'(z)=f(z)$ в $G$.
                </div>
                <div class="thmbox">
                    <span class="label label-thm">Формула Ньютона–Лейбница.</span> Если $F'=f$ в односвязной $G$, то
                    <div class="formula">$\\int_{z_1}^{z_2}f(z)\\,dz=F(z_2)-F(z_1)$</div>

                </div>
                <div class="exbox">
                    <span class="label label-ex">Пример.</span> $\\displaystyle\\oint_{|z|=1}\\frac{dz}{z}$: $z(t)=e^{it}$, $z'(t)=ie^{it}$, $t\\in[0,2\\pi]$.
                    $\\int_0^{2\\pi}\\frac{1}{e^{it}}\\cdot ie^{it}\\,dt=i\\int_0^{2\\pi}dt=2\\pi i$.
                </div>
            `

            content: `

                <div class="corbox">
                    <span class="label label-cor">Следствие — независимость от пути.</span> В односвязной области $\\displaystyle\\int_{z_1}^{z_2}f\\,dz$ не зависит от пути.

                <div class="thmbox">

                <div class="exbox">
                    <span class="label label-ex">Важный пример.</span> $\\displaystyle\\oint_{|z|=r}\\frac{dz}{(z-a)^n}=\\begin{cases}2\\pi i,&n=1,\\\\0,&n\\ne1\\end{cases}$ при $|a|<r$.
